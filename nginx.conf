events {
    worker_connections 1024;
}

http {

    upstream devmart_api {
        least_conn;
        server devmart-api-1:3000;
        server devmart-api-2:3000;
    }

    upstream users_api {
        server users-api-1:3001;
    }

    upstream notifications_api {
        server notifications-api-1:3002;
    }

    upstream websocket {
        server websocket-1:5000;
    }

    upstream devmart_ui {
        server devmart-ui-1:80;
    }

    server {
        listen 80;

        location /api/v1/auth/ {
            proxy_pass         http://users_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/v1/users/ {
            proxy_pass         http://users_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /api/v1/notifications {
            proxy_pass         http://notifications_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /socket.io/ {
            proxy_pass         http://websocket;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/v1/ {
            proxy_pass         http://devmart_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location / {
            proxy_pass         http://devmart_ui;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }
    }
}